<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Watch</title>
    <style>
        body{
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            justify-content: center;
            background: url("https://plus.unsplash.com/premium_photo-1666863909125-3a01f038e71f?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bGFuZHNjYXBlfGVufDB8fDB8fHww");
            background-size: cover;
            overflow: hidden;

        }
        h2{
            text-transform: capitalize;
            letter-spacing: 4px;
            text-align: center;
            color: white;

        }
        .clock{
            display: flex;
        }
        .clock div{
            margin: 5px;
            position: relative;

        }
        .clock span{
            width: 100px;
            height: 80px;
            background: slateblue;
            opacity: .8;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, .3);
        }
        .clock .text{
            height: 30px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px ;
            background-color: darkblue;
            opacity: .8;
        }
        .clock #ampm{
            bottom: 0;
            position: absolute;
            width: 60px;
            height: 30px;
            font-size: 20px;
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <h2>Digital Clock</h2>
    <div class="clock">
        <div>
            <span id="hour">00</span>
            <span class="text">Hours</span>
        </div>
        <div>
            <span id="minutes">00</span>
            <span class="text">Minutes</span>
        </div>
        <div>
            <span id="seconds">00</span>
            <span class="text">Seconds</span>
        </div>
        <div>
            <span id="ampm">AM</span>
        </div>
    </div>

    <script>
        const hourEl = document.getElementById("hour")

        const minuteEl = document.getElementById("minutes");   

        const secondEl = document.getElementById("seconds");

        const ampmEl = document.getElementById("ampm");

        function updateClock() {
            let h = new Date ().getHours()
            let m = new Date ().getMinutes()
            let s = new Date ().getSeconds()
            let ampm ="AM "

            if(h > 12){
                h= h-12
                ampm = "PM"
            }

            h = h <10 ? "0" + h : h;
            m = m <10 ? "0" + m : m;
            s = s <10 ? "0" + s : s;
          
            hourEl.innerText = h;
            minuteEl.innerText = m;
            secondEl.innerText = s;
            ampm , (innerText = ampm);
            setTimeout(()=> {
                updateClock();
            }, 1000);
        }
        updateClock();
    </script>
</body>
</html>
