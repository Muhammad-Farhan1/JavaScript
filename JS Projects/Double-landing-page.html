<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Landing Page</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: center;
            text-align: center;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        h1{
            font-size: 100px;
            color: aliceblue;
            backdrop-filter: brightness(.50) ;
            letter-spacing: 4px;
        }
        .btn{
            background: #000;
            color: white;
            padding: 20px 40px;
            font-size: 25px;
            border: 4px solid;
            cursor: pointer;
            transition: 1s background-color;
        }
        .btn:hover{
            background-color: white;
            color: #000;
        }
         .split{
            width: 50%;
            height: 100%;
            top: 0;
        }
        .split.left{
            position: absolute;
            left: 0;
            background: pink;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7xdq3f6421BhKpVcBDf0DoL4YNHECsl0-8g&s");
            background-size: contain;
        }
        .split.right{
            position: absolute;
            right: 0;
            background-color: lightblue ;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSeYh1q4YKahdkjwONBbZBo7A3OtN4hA5HlWg&s");
            background-size: cover;
        }
        .active-left .left{
            width: 75%;
        }
        .active-right .right{
            width: 75%;
        }

        .left , .right{
            transition: width 2s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="split left">
            <h1>Apple</h1>
            <button class="btn">Buy Now</button>
        </div>
        <div class="split right">
            <h1>Samsung</h1>
            <button class="btn">Buy Now</button>
        </div>

    </div>
    <script>
        const containerEl = document.querySelector('.container');

        const leftEl = document.querySelector('.left');

        const rightEl = document.querySelector('.right');

        leftEl.addEventListener('click', () =>{
            containerEl.classList.add('active-left');
        })

        leftEl.addEventListener('mouseleave' , () =>{
            containerEl.classList.remove('active-left');
        })

        rightEl.addEventListener('mouseenter' , () =>{
            containerEl.classList.add('active-right');
        })
        rightEl.addEventListener('mouseleave' , () =>{
            containerEl.classList.remove('active-right');
        })
    </script>
</body>
</html>
