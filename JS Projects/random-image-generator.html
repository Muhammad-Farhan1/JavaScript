<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Image Generator</title>

    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: burlywood;
            font-family: Arial, sans-serif;
        }

        .image-container {
            text-align: center;
        }

        .image-container img {
            width: 300px;
            height: 300px;
            margin: 10px;
            border-radius: 10px;
            background-color: lightgray;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn {
            margin: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: slateblue;
            color: white;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="image-container">
        <img src="https://picsum.photos/300?random=1" alt="Random Image">
        <img src="https://picsum.photos/300?random=2" alt="Random Image">
        <img src="https://picsum.photos/300?random=3" alt="Random Image">
        <img src="https://picsum.photos/300?random=4" alt="Random Image">
        <img src="https://picsum.photos/300?random=5" alt="Random Image">
        <img src="https://picsum.photos/300?random=6" alt="Random Image">
    </div>

    <button class="btn">Load More</button>

    <script>
        const imageContainer = document.querySelector(".image-container");
        const loadMoreBtn = document.querySelector(".btn");

        const IMAGES_PER_CLICK = 10;

        loadMoreBtn.addEventListener("click", addNewImages);

        function addNewImages() {
            for (let i = 0; i < IMAGES_PER_CLICK; i++) {
                const img = document.createElement("img");

                img.src = `https://picsum.photos/300?random=${Math.floor(
                    Math.random() * 2000
                )}`;

                img.alt = "Random Image";

                imageContainer.appendChild(img);
            }
        }
    </script>
</body>
</html>
