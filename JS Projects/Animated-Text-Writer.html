<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Typing Text Effect</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: salmon;
      font-family: "Permanent Marker", cursive;
      text-align: center;
    }

    .container h1 {
      font-size: 3rem;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1></h1>
  </div>

  <script>
    const container = document.querySelector(".container h1");

    const careers = [
      "Student",
      "Web Developer",
      "Freelancer",
      "Not perfect right now"
    ];

    let careerIndex = 0;
    let characterIndex = 0;

    function updateText() {

      const currentCareer = careers[careerIndex];

      characterIndex++;

      container.textContent =
        `I am a ${currentCareer.slice(0, characterIndex)}`;

      if (characterIndex === currentCareer.length) {
        careerIndex++;

        if (careerIndex === careers.length) {
          careerIndex = 0;
        }

        characterIndex = 0;
      }

      setTimeout(updateText, 200);
    }

    updateText();
  </script>

</body>
</html>
